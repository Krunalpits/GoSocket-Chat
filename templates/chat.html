<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>GoSocket Chat</title>
  <link rel="stylesheet" href="/static/css/styles.css" />
</head>
<body class="chat-body">
  <div class="app">
    <div class="sb">
      <div class="sb-head">
        <div class="logo-wrap">
          <div class="logo-mark-sm">
            <svg viewBox="0 0 18 18" fill="none" width="16" height="16">
              <circle cx="9" cy="9" r="3.5" fill="white" opacity="0.9"/>
              <path d="M9 1.5V5M9 13V16.5M1.5 9H5M13 9H16.5" stroke="white" stroke-width="1.3" stroke-linecap="round" opacity="0.6"/>
            </svg>
          </div>
          <div>
            <div class="lt">GoSocket</div>
            <div class="ls">Go · WebSocket · Goroutines</div>
          </div>
        </div>
      </div>
      <div class="pulse-bar">
        <div class="pulse-dot"></div>
        <span class="pulse-txt">connected</span>
        <span class="ping">&lt; 5ms</span>
      </div>
      <div class="slabel">Channels</div>
      <div class="room active">
        <span class="hash">#</span>
        <span class="rname" id="room-name">general</span>
      </div>
      <div class="divider"></div>
      <div class="slabel">Online</div>
      <div class="ulist" id="user-list"></div>
    </div>

    <div class="main">
      <div class="mhead">
        <div>
          <div class="mroom"># <span id="header-room">general</span></div>
          <div class="mmeta">goroutines active · hub broadcasting</div>
        </div>
        <div class="badges">
          <span class="tag tgo">Go 1.26</span>
          <span class="tag tws">WebSocket</span>
        </div>
      </div>
      <div class="msgs" id="messages"></div>
      <div class="inp-wrap">
        <input class="inp" id="msg" type="text" placeholder="Type a message..." />
        <button class="sbtn" id="sendBtn">Send</button>
      </div>
    </div>
  </div>

  <script src="/static/js/chat.js"></script>
</body>
</html>
